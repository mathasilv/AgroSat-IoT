[env:ttgo-lora32-v21]
platform = espressif32
board = ttgo-lora32-v21
framework = arduino

; Monitor
monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder
    default

; Build
build_flags =
  -Iinclude
  -Idrivers/sensors
  -Ihal/interface
  -Ihal/platform/esp32

; Upload
upload_speed = 460800

; Dependências principais (sem as libs antigas de sensor)
lib_deps = 
    bblanchon/ArduinoJson @ ^6.21.3
    https://github.com/ssilverman/libCBOR.git
    ; Display
    adafruit/Adafruit GFX Library @ ^1.12.4
    adafruit/Adafruit SSD1306 @ ^2.5.15
    ; SD / SPI / WiFi / HTTPClient vêm do core ESP32, não precisam ser listados

; Filesystem / flash
board_build.filesystem = littlefs
upload_resetmethod = nodemcu
board_build.flash_mode = dio

; Se seus HALs (HAL, BMP280Hal, SI7021Hal, CCS811Hal, MPU9250Hal, DS3231Hal)
; estiverem em lib/, não precisa pôr em lib_deps. Se estiverem como libs globais
; do PlatformIO Registry, pode adicionar aqui também, ex:
;   HAL @ 1.0.0
;   BMP280Hal @ 1.0.0
;   SI7021Hal
;   CCS811Hal
;   MPU9250Hal
;   DS3231Hal
